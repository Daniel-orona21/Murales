<router-outlet></router-outlet>

<!-- This overlay will only appear when the backend is confirmed to be waking or offline -->
<div *ngIf="backendStatus() !== 'online'" class="status-overlay">
  <div class="status-container">
    <div class="pyramid-loader">
      <div class="wrapper">
        <span class="side side1"></span>
        <span class="side side2"></span>
        <span class="side side3"></span>
        <span class="side side4"></span>
        <span class="shadow"></span>
      </div>  
    </div>
    <div class="status-text" [ngSwitch]="backendStatus()">
      <div *ngSwitchCase="'waking'">
        <h2>Despertando el servidor...</h2>
        <p>Esto puede tardar un momento. El servicio gratuito de Render se suspende tras un periodo de inactividad.</p>
      </div>
      <div *ngSwitchCase="'offline'">
        <h2>El servidor no responde</h2>
        <p>No se pudo establecer conexión con el backend. Por favor, inténtalo de nuevo más tarde.</p>
      </div>
    </div>
  </div>
</div>
